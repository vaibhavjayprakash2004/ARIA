<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A.R.I.A</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@300;400;500&display=swap');

  :root {
    --arc: #00d4ff;
    --arc-dim: #0088aa;
    --arc-glow: #00d4ff55;
    --gold: #ffc947;
    --bg: #03080f;
    --panel: #060e1a;
    --text: #cde8ff;
    --danger: #ff4466;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Top corner accents */
  .corner { position: fixed; width: 80px; height: 80px; z-index: 1; }
  .corner.tl { top: 0; left: 0; border-top: 2px solid var(--arc); border-left: 2px solid var(--arc); }
  .corner.tr { top: 0; right: 0; border-top: 2px solid var(--arc); border-right: 2px solid var(--arc); }
  .corner.bl { bottom: 0; left: 0; border-bottom: 2px solid var(--arc); border-left: 2px solid var(--arc); }
  .corner.br { bottom: 0; right: 0; border-bottom: 2px solid var(--arc); border-right: 2px solid var(--arc); }

  header {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 32px 20px 10px;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 900;
    letter-spacing: 0.3em;
    color: var(--arc);
    text-shadow: 0 0 20px var(--arc-glow), 0 0 60px var(--arc-glow);
  }

  .tagline {
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    color: var(--arc-dim);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Arc reactor / orb */
  .orb-wrap {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: center;
    margin: 28px 0 18px;
  }

  .orb {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 35%, #00eeff55, #001a2a 65%);
    border: 2px solid var(--arc);
    box-shadow:
      0 0 20px var(--arc-glow),
      0 0 60px var(--arc-glow),
      inset 0 0 30px rgba(0,212,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.3s;
    position: relative;
  }

  .orb:hover { transform: scale(1.05); }

  .orb::before {
    content: '';
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 1px solid rgba(0,212,255,0.2);
    animation: orbit-ring 4s linear infinite;
  }

  .orb::after {
    content: '';
    position: absolute;
    inset: -24px;
    border-radius: 50%;
    border: 1px dashed rgba(0,212,255,0.1);
    animation: orbit-ring 7s linear infinite reverse;
  }

  @keyframes orbit-ring {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .orb-icon {
    font-size: 3rem;
    user-select: none;
    transition: transform 0.2s;
  }

  .orb.listening {
    animation: pulse-listen 1s ease-in-out infinite;
    border-color: var(--gold);
    box-shadow:
      0 0 30px rgba(255,201,71,0.5),
      0 0 80px rgba(255,201,71,0.25),
      inset 0 0 30px rgba(255,201,71,0.1);
  }

  .orb.thinking {
    animation: pulse-think 0.6s ease-in-out infinite;
  }

  @keyframes pulse-listen {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  @keyframes pulse-think {
    0%, 100% { box-shadow: 0 0 20px var(--arc-glow), inset 0 0 20px rgba(0,212,255,0.1); }
    50% { box-shadow: 0 0 50px rgba(0,212,255,0.7), inset 0 0 40px rgba(0,212,255,0.25); }
  }

  .status-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--arc-dim);
    text-transform: uppercase;
    text-align: center;
    min-height: 18px;
    margin-bottom: 6px;
    transition: color 0.3s;
  }

  .status-text.active { color: var(--arc); }
  .status-text.listening { color: var(--gold); }
  .status-text.error { color: var(--danger); }

  /* Waveform bars */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 28px;
    justify-content: center;
    margin-bottom: 12px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .waveform.active { opacity: 1; }
  .wave-bar {
    width: 3px;
    border-radius: 2px;
    background: var(--arc);
    height: 4px;
    transition: height 0.15s;
  }
  .waveform.listening .wave-bar {
    animation: wave-anim 0.8s ease-in-out infinite;
    background: var(--gold);
  }
  .wave-bar:nth-child(1) { animation-delay: 0s; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { animation-delay: 0.4s; }
  .wave-bar:nth-child(6) { animation-delay: 0.3s; }
  .wave-bar:nth-child(7) { animation-delay: 0.2s; }
  .wave-bar:nth-child(8) { animation-delay: 0.1s; }

  @keyframes wave-anim {
    0%, 100% { height: 4px; }
    50% { height: 22px; }
  }

  /* Main container */
  .main {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 680px;
    padding: 0 16px 40px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Transcript display */
  .transcript-box {
    background: var(--panel);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 2px;
    padding: 12px 16px;
    font-size: 0.85rem;
    min-height: 40px;
    color: rgba(255,255,255,0.6);
    font-style: italic;
    letter-spacing: 0.03em;
    position: relative;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
  }

  .transcript-box::before {
    content: 'VOICE INPUT';
    position: absolute;
    top: -8px;
    left: 10px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.5rem;
    letter-spacing: 0.2em;
    color: var(--arc-dim);
    background: var(--panel);
    padding: 0 6px;
  }

  /* Chat log */
  .chat-log {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 340px;
    overflow-y: auto;
    padding-right: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--arc-dim) transparent;
  }

  .chat-log::-webkit-scrollbar { width: 4px; }
  .chat-log::-webkit-scrollbar-thumb { background: var(--arc-dim); border-radius: 2px; }

  .msg {
    padding: 12px 14px;
    border-radius: 2px;
    font-size: 0.88rem;
    line-height: 1.6;
    position: relative;
    animation: msg-in 0.3s ease-out;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    background: rgba(0,212,255,0.06);
    border-left: 2px solid var(--arc);
    color: var(--arc);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
  }

  .msg.user::before {
    content: '▶ YOU';
    display: block;
    font-size: 0.5rem;
    letter-spacing: 0.2em;
    color: var(--arc-dim);
    margin-bottom: 5px;
  }

  .msg.aria {
    background: rgba(255,201,71,0.04);
    border-left: 2px solid var(--gold);
    color: var(--text);
    clip-path: polygon(0 0, 100% 0, 100% 100%, 10px 100%, 0 calc(100% - 10px));
  }

  .msg.aria::before {
    content: '⬡ ARIA';
    display: block;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.5rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    margin-bottom: 5px;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 12px 14px;
    background: rgba(255,201,71,0.04);
    border-left: 2px solid var(--gold);
  }

  .typing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    animation: dot-bounce 1s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes dot-bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Text input bar */
  .input-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }

  .cmd-input {
    flex: 1;
    background: var(--panel);
    border: 1px solid rgba(0,212,255,0.25);
    color: var(--arc);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    padding: 10px 14px;
    outline: none;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
    transition: border-color 0.2s;
  }

  .cmd-input:focus { border-color: var(--arc); }
  .cmd-input::placeholder { color: rgba(0,212,255,0.3); }

  .btn {
    background: transparent;
    border: 1px solid var(--arc);
    color: var(--arc);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  }

  .btn:hover {
    background: var(--arc);
    color: var(--bg);
    box-shadow: 0 0 20px var(--arc-glow);
  }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-mic {
    border-color: var(--gold);
    color: var(--gold);
    font-size: 1rem;
    padding: 10px 14px;
  }

  .btn-mic:hover {
    background: var(--gold);
    color: var(--bg);
    box-shadow: 0 0 20px rgba(255,201,71,0.4);
  }

  .btn-mic.active {
    background: var(--gold);
    color: var(--bg);
    animation: mic-pulse 1s ease-in-out infinite;
  }

  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 10px rgba(255,201,71,0.4); }
    50% { box-shadow: 0 0 30px rgba(255,201,71,0.8); }
  }

  /* HUD scan line effect */
  .scanline {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--arc), transparent);
    opacity: 0.3;
    animation: scan 6s linear infinite;
    pointer-events: none;
    z-index: 10;
  }

  @keyframes scan {
    from { top: -2px; }
    to { top: 100vh; }
  }

  .hint {
    text-align: center;
    font-size: 0.7rem;
    color: rgba(0,212,255,0.3);
    letter-spacing: 0.1em;
    margin-top: -4px;
  }

  .no-support {
    background: rgba(255,68,102,0.1);
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 10px 14px;
    font-size: 0.8rem;
    text-align: center;
    border-radius: 2px;
    display: none;
  }
</style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>
<div class="scanline"></div>

<header>
  <div class="logo">A.R.I.A</div>
  <div class="tagline">Adaptive Responsive Intelligence Assistant</div>
</header>

<div class="orb-wrap">
  <div class="orb" id="orb" title="Click to speak">
    <span class="orb-icon" id="orbIcon">⬡</span>
  </div>
</div>

<div class="status-text" id="statusText">SYSTEM ONLINE — AWAITING COMMAND</div>
<div class="waveform" id="waveform">
  <div class="wave-bar"></div><div class="wave-bar"></div>
  <div class="wave-bar"></div><div class="wave-bar"></div>
  <div class="wave-bar"></div><div class="wave-bar"></div>
  <div class="wave-bar"></div><div class="wave-bar"></div>
</div>

<div class="main">
  <div class="no-support" id="noSupport">
    ⚠ Voice recognition not supported in this browser. Use Chrome or Edge. Text input still works.
  </div>

  <div class="transcript-box" id="transcriptBox">Speak or type your command...</div>

  <div class="chat-log" id="chatLog"></div>

  <div class="input-row">
    <input class="cmd-input" id="cmdInput" type="text" placeholder="Type your command here..." />
    <button class="btn btn-mic" id="micBtn" title="Hold to speak">🎤</button>
    <button class="btn" id="sendBtn">SEND</button>
  </div>

  <div class="hint">Click orb or 🎤 to speak • Enter to send</div>
</div>

<script>
  const orb = document.getElementById('orb');
  const orbIcon = document.getElementById('orbIcon');
  const statusText = document.getElementById('statusText');
  const waveform = document.getElementById('waveform');
  const transcriptBox = document.getElementById('transcriptBox');
  const chatLog = document.getElementById('chatLog');
  const cmdInput = document.getElementById('cmdInput');
  const micBtn = document.getElementById('micBtn');
  const sendBtn = document.getElementById('sendBtn');
  const noSupport = document.getElementById('noSupport');

  let recognition = null;
  let isListening = false;
  let isThinking = false;
  const conversationHistory = [];

  // Speech Recognition Setup
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onstart = () => {
      isListening = true;
      setStatus('LISTENING...', 'listening');
      orb.classList.add('listening');
      orbIcon.textContent = '🎤';
      waveform.classList.add('active', 'listening');
      micBtn.classList.add('active');
    };

    recognition.onresult = (e) => {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) final += e.results[i][0].transcript;
        else interim += e.results[i][0].transcript;
      }
      transcriptBox.textContent = final || interim || '...';
      if (final) cmdInput.value = final;
    };

    recognition.onend = () => {
      isListening = false;
      recognitionActive = false;
      orb.classList.remove('listening');
      orbIcon.textContent = '⬡';
      waveform.classList.remove('listening');
      micBtn.classList.remove('active');
      const val = cmdInput.value.trim();
      if (val) {
        sendCommand(val);
      } else {
        setStatus('SYSTEM ONLINE — AWAITING COMMAND', '');
        waveform.classList.remove('active');
      }
    };

    recognition.onerror = (e) => {
      isListening = false;
      orb.classList.remove('listening');
      waveform.classList.remove('active', 'listening');
      micBtn.classList.remove('active');
      orbIcon.textContent = '⬡';
      if (e.error === 'not-allowed') {
        setStatus('MIC BLOCKED — NEEDS HTTPS TO WORK', 'error');
        transcriptBox.textContent = '⚠ Voice needs HTTPS. Upload to GitHub Pages or Netlify, then try again. Text input works fine!';
      } else if (e.error === 'no-speech') {
        setStatus('NO SPEECH DETECTED — TRY AGAIN', 'error');
        setTimeout(() => setStatus('SYSTEM ONLINE — AWAITING COMMAND', ''), 2000);
      } else {
        setStatus('MIC ERROR: ' + e.error.toUpperCase(), 'error');
      }
    };
  } else {
    noSupport.style.display = 'block';
  }

  function setStatus(text, type = '') {
    statusText.textContent = text;
    statusText.className = 'status-text ' + type;
  }

  let recognitionActive = false;

  function startListening() {
    if (!recognition) return;
    if (isListening || recognitionActive) {
      try { recognition.stop(); } catch(e) {}
      return;
    }
    cmdInput.value = '';
    transcriptBox.textContent = 'Listening...';
    try {
      recognitionActive = true;
      recognition.start();
    } catch(e) {
      recognitionActive = false;
      isListening = false;
      setStatus('MIC ERROR — TRY AGAIN', 'error');
    }
  }

  recognition && (recognition.onend = function(orig) {
    return function() {
      recognitionActive = false;
      if (orig) orig.call(this, ...arguments);
    };
  }(recognition.onend));

  orb.addEventListener('click', startListening);
  micBtn.addEventListener('click', startListening);

  // TTS
  function speak(text) {
    if (!window.speechSynthesis) return;
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 0.95;
    utter.pitch = 0.85;
    utter.volume = 0.9;

    // Pick a good voice if available
    const voices = speechSynthesis.getVoices();
    const preferred = voices.find(v =>
      v.name.toLowerCase().includes('google uk') ||
      v.name.toLowerCase().includes('daniel') ||
      v.name.toLowerCase().includes('james') ||
      v.name.toLowerCase().includes('en-gb') ||
      (v.lang === 'en-GB')
    ) || voices.find(v => v.lang.startsWith('en')) || voices[0];
    if (preferred) utter.voice = preferred;

    utter.onstart = () => {
      orbIcon.textContent = '🔊';
      orb.classList.add('thinking');
      waveform.classList.add('active');
    };
    utter.onend = () => {
      orbIcon.textContent = '⬡';
      orb.classList.remove('thinking');
      waveform.classList.remove('active');
      setStatus('SYSTEM ONLINE — AWAITING COMMAND', '');
    };
    speechSynthesis.speak(utter);
  }

  // Ensure voices load
  if (window.speechSynthesis) {
    speechSynthesis.getVoices();
    speechSynthesis.addEventListener('voiceschanged', () => speechSynthesis.getVoices());
  }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    chatLog.appendChild(div);
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typingIndicator';
    div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    chatLog.appendChild(div);
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  async function sendCommand(text) {
    if (!text || isThinking) return;
    isThinking = true;
    cmdInput.value = '';
    transcriptBox.textContent = text;
    addMessage('user', text);
    addTyping();
    setStatus('PROCESSING...', 'active');
    orb.classList.add('thinking');
    orbIcon.textContent = '⚙';
    waveform.classList.add('active');
    sendBtn.disabled = true;

    conversationHistory.push({ role: 'user', content: text });

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: `You are A.R.I.A — Adaptive Responsive Intelligence Assistant, a highly advanced AI assistant. You are precise, witty, slightly formal but personable, and always helpful. You speak with confidence and subtle British charm. Keep responses concise and natural for voice output — avoid bullet points or markdown formatting. Respond as if speaking directly to the user.`,
          messages: conversationHistory
        })
      });

      const data = await res.json();
      removeTyping();

      if (data.content && data.content[0]) {
        const reply = data.content[0].text;
        conversationHistory.push({ role: 'assistant', content: reply });
        addMessage('aria', reply);
        setStatus('RESPONDING', 'active');
        orb.classList.remove('thinking');
        speak(reply);
      } else {
        throw new Error(data.error?.message || 'Unknown error');
      }
    } catch (err) {
      removeTyping();
      orb.classList.remove('thinking');
      waveform.classList.remove('active');
      const errMsg = 'My apologies, I encountered an error: ' + err.message;
      addMessage('aria', errMsg);
      setStatus('ERROR — PLEASE RETRY', 'error');
      orbIcon.textContent = '⬡';
      speak(errMsg);
    }

    isThinking = false;
    sendBtn.disabled = false;
  }

  sendBtn.addEventListener('click', () => {
    const val = cmdInput.value.trim();
    if (val) sendCommand(val);
  });

  cmdInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const val = cmdInput.value.trim();
      if (val) sendCommand(val);
    }
  });

  // Welcome
  setTimeout(() => {
    const welcome = "Good day. I am A.R.I.A. All systems are online and ready. How may I assist you today?";
    addMessage('aria', welcome);
    speak(welcome);
  }, 1000);
</script>
</body>
</html>
